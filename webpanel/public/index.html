<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <div id="root"></div>

    <input type="range" min="0" max="65535" oninput="update_color(this, 'red');"><br>
    <input type="range" min="0" max="65535" oninput="update_color(this, 'green');"><br>
    <input type="range" min="0" max="65535" oninput="update_color(this, 'blue');"><br><br>
    <input type="checkbox" onclick="set_power(this);" onload="update_power(this)">

    <script>
        const ws = new WebSocket('/control/rgb');

        var state = {
            red: 0,
            green: 0,
            blue: 0
        };

        function update_color(slider, color) {
            const brightness = slider.value;
            console.log(`${color}: ${brightness} (${Math.round(brightness / 65535 * 100)}%)`);

            state[color] = brightness;

            const buf = new ArrayBuffer(6);
            const view = new DataView(buf);

            view.setUint16(0, state.red, false);
            view.setUint16(2, state.green, false);
            view.setUint16(4, state.blue, false);

            ws.send(buf);
        }

        function set_power(checkbox) {
            const req = fetch('/control/power', { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ power: checkbox.checked }) });
            req.then(response => {
                if (response.ok)
                    console.log(`power: ${checkbox.checked}`);
                else
                    alert("Can't power");
            });
        }

        function check_power(checkbox) {
            const req = fetch('/control/power');
            req.then(response => {
                response.json().then(json => {
                    const result = JSON.parse(json);
                    console.log(result);
                    if (typeof result.power == 'boolean')
                        checkbox.value = result.power;
                });
            });
        }
    </script>
</body>

</html>
